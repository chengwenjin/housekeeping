server:
  port: 8080
  servlet:
    context-path: /api
  
spring:
  application:
    name: jiazheng-miniapp
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jiazheng_miniapp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
    
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: JiazhengHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
  
  # Jackson 配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# MyBatis-Plus 配置
mybatis-plus:
  # 暂时注释，避免实体类缺失导致启动失败
  # mapper-locations: classpath*:/mapper/**/*.xml
  # 实体扫描包
  type-aliases-package: com.jz.miniapp.entity
  configuration:
    # 驼峰命名映射
    map-underscore-to-camel-case: true
    # 日志打印
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键类型 (自增)
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deletedAt
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 表名下划线转驼峰
      table-underline: true

# 微信小程序配置
wechat:
  miniapp:
    appid: ${WECHAT_APPID:your_appid}
    secret: ${WECHAT_SECRET:your_secret}

# JWT 配置
jwt:
  # 密钥
  secret: ${JWT_SECRET:jiazheng_miniapp_secret_key_2026_very_secure_key_for_token_generation}
  # 小程序 token 过期时间 (7 天)
  expiration: 604800000
  # 管理后台 token 过期时间 (8 小时)
  admin-expiration: 28800000
  # Refresh Token 过期时间 (30 天)
  refresh-expiration: 2592000000
  # Token 前缀
  prefix: Bearer 

# OSS 对象存储配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:your_access_key}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your_secret_key}
    bucket-name: ${OSS_BUCKET_NAME:your_bucket}
    # CDN 域名
    cdn-domain: ${OSS_CDN_DOMAIN:https://cdn.example.com}

# Knife4j OpenAPI 3 配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    swagger-model-name: swagger实体类

# 日志配置
logging:
  level:
    root: INFO
    com.jz.miniapp: DEBUG
    com.jz.miniapp.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
